<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Feelgram Music</title>
<style>
/* ── TOKENS ── */
:root {
  --bg: #f6f6f6;
  --surface: #ffffff;
  --surface2: #f0f0f0;
  --border: #e8e8e8;
  --text: #111111;
  --text2: #888888;
  --text3: #bbbbbb;
  --accent: #111111;
  --active-bg: #efefef;
  --header-h: 54px;
  --mini-h: 68px;
  --drawer-w: 270px;
  --radius: 14px;
  --transition: cubic-bezier(0.32, 0.72, 0, 1);
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; }

/* ── LAYOUT ── */
.app-wrap {
  display: flex;
  flex-direction: column;
  height: 100%;
  position: relative;
}

/* ── HEADER ── */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 20;
}
.btn-icon {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  color: var(--text);
  transition: background .15s;
  flex-shrink: 0;
}
.btn-icon:active { background: var(--surface2); }
.logo {
  flex: 1;
  text-align: center;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.logo em { font-style: normal; color: var(--text2); font-weight: 400; }

/* ── SEARCH BAR ── */
.search-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: none;
  position: relative;
  z-index: 19;
  flex-shrink: 0;
}
.search-bar.open { display: block; }
.search-bar input {
  width: 100%;
  background: var(--surface2);
  border: none;
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 14px;
  color: var(--text);
  outline: none;
}
.search-results {
  position: absolute;
  top: calc(100% + 0px);
  left: 0; right: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  max-height: 50vh;
  overflow-y: auto;
  display: none;
  z-index: 200;
}
.search-results.visible { display: block; }
.sr-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  font-size: 13.5px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.sr-item:last-child { border-bottom: none; }
.sr-item:active { background: var(--surface2); }
.sr-title { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.sr-folder { font-size: 11px; color: var(--text2); flex-shrink: 0; }

/* ── BODY (sidebar + main) ── */
.body-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* ── DRAWER (playlist sidebar) ── */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 40;
  opacity: 0;
  transition: opacity .3s;
}
.drawer-overlay.open {
  display: block;
  opacity: 1;
}
.drawer {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--drawer-w);
  background: var(--surface);
  z-index: 50;
  display: flex;
  flex-direction: column;
  transform: translateX(-100%);
  transition: transform .35s var(--transition);
  box-shadow: 4px 0 24px rgba(0,0,0,0.08);
}
.drawer.open { transform: translateX(0); }

/* Desktop: sidebar always open */
@media (min-width: 768px) {
  .drawer {
    position: relative;
    transform: none !important;
    box-shadow: none;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .drawer-overlay { display: none !important; }
  .btn-playlist { display: none !important; }
}

.drawer-header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.5px;
}
.drawer-header span { flex: 1; }
.btn-close-drawer {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  color: var(--text2);
  font-size: 18px;
}
.btn-close-drawer:active { background: var(--surface2); }

@media (min-width: 768px) {
  .btn-close-drawer { display: none; }
}

.folder-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.folder-list::-webkit-scrollbar { width: 3px; }
.folder-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.folder-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: background .12s;
  user-select: none;
}
.folder-item:active { background: var(--surface2); }
.folder-item.active { background: var(--active-bg); }
.fi-icon { font-size: 15px; font-weight: 300; width: 22px; text-align: center; flex-shrink: 0; color: var(--text3); }
.fi-name { flex: 1; font-size: 13.5px; font-weight: 500; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.fi-count { font-size: 11px; color: var(--text2); min-width: 24px; text-align: right; }

/* ── MAIN AREA ── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  background: var(--bg);
}
.list-header {
  background: var(--surface);
  padding: 16px 18px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.list-header-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.lh-icon { font-size: 22px; }
.lh-name { font-size: 18px; font-weight: 700; flex: 1; }
.lh-count { font-size: 12px; color: var(--text2); }
.btn-play-all {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 10px;
  background: #e8e8e8;
  color: var(--text);
  border-radius: 20px;
  padding: 4px 11px;
  font-size: 11px;
  font-weight: 600;
  transition: opacity .15s;
}
.btn-play-all:active { opacity: .75; }

.song-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px 8px;
}
.song-list::-webkit-scrollbar { width: 3px; }
.song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.song-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: background .1s;
}
.song-row:active { background: var(--surface2); }
.song-row.playing { background: var(--active-bg); }
.song-num {
  width: 22px; text-align: right;
  font-size: 12px; color: var(--text3);
  flex-shrink: 0;
}
.song-row.playing .song-num { display: none; }
.song-eq {
  display: none;
  width: 22px;
  align-items: flex-end;
  justify-content: center;
  gap: 2px;
  height: 14px;
  flex-shrink: 0;
}
.song-row.playing .song-eq { display: flex; }
.eq-bar {
  width: 3px; background: var(--accent);
  border-radius: 1px;
  animation: eq .7s ease-in-out infinite alternate;
}
.eq-bar:nth-child(2) { animation-delay: .12s; }
.eq-bar:nth-child(3) { animation-delay: .25s; }
@keyframes eq { from { height: 2px; } to { height: 13px; } }
.song-title {
  font-size: 13.5px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.song-row.playing .song-title { font-weight: 600; }

/* ── MINI PLAYER ── */
.mini-player {
  height: var(--mini-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  z-index: 30;
  box-shadow: 0 -2px 16px rgba(0,0,0,0.06);
}
.mp-art {
  width: 44px; height: 44px;
  background: var(--surface2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  overflow: hidden;
}
.mp-art img { width: 100%; height: 100%; object-fit: cover; display: none; }
.mp-art img.loaded { display: block; }
.mp-art .art-fb { transition: opacity .2s; }
.mp-art img.loaded ~ .art-fb { display: none; }
.mp-info { flex: 1; min-width: 0; }
.mp-title {
  font-size: 13.5px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mp-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.mp-play-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--text);
  border-radius: 50%;
  transition: background .15s;
}
.mp-play-btn:active { background: var(--surface2); }

/* Desktop mini player: show prev/next too */
@media (min-width: 768px) {
  .mini-player {
    padding: 0 24px;
    gap: 16px;
    cursor: default;
  }
  .mp-desktop-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 2;
    justify-content: center;
    flex-direction: column;
  }
  .mp-ctrl-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .mp-ctrl-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
    border-radius: 50%;
    transition: color .15s, background .15s;
  }
  .mp-ctrl-btn:hover { color: var(--text); background: var(--surface2); }
  .mp-ctrl-btn.active { color: var(--accent); }
  .mp-ctrl-btn.big {
    width: 40px; height: 40px;
    background: var(--text);
    color: #fff;
    border-radius: 50%;
  }
  .mp-ctrl-btn.big:hover { opacity: .85; }
  .mp-progress-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text2);
  }
  .mp-prog-bar {
    flex: 1; height: 3px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
  }
  .mp-prog-fill {
    height: 100%;
    background: var(--text);
    border-radius: 2px;
    width: 0%;
    transition: width .1s linear;
  }
}
.mp-desktop-controls { display: none; }
@media (min-width: 768px) { .mp-desktop-controls { display: flex; } .mp-play-btn { display: none; } }

/* ── FULL PLAYER ── */
.full-player {
  position: fixed;
  inset: 0;
  background: var(--surface);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translateY(100%);
  transition: transform .4s var(--transition);
  overflow: hidden;
}
.full-player.open { transform: translateY(0); }

/* 앨범아트 블러 배경 (Apple Music 스타일) */
.fp-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.fp-bg-art {
  position: absolute;
  inset: -60px;
  width: calc(100% + 120px);
  height: calc(100% + 120px);
  object-fit: cover;
  /* 채도 낮춰 눈 피로 감소: 2.8 → 1.6 */
  filter: blur(55px) saturate(1.6) brightness(1.04);
  opacity: 0;
  transition: opacity .9s ease;
}
.fp-bg-art.show { opacity: 1; }
.fp-bg-overlay {
  position: absolute;
  inset: 0;
  /* 흰 오버레이 살짝 강화해 채도 보정 */
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.22) 0%,
    rgba(255,255,255,0.52) 52%,
    rgba(255,255,255,0.86) 100%
  );
}
.full-player > *:not(.fp-bg) { position: relative; z-index: 1; }

.fp-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 4px;
  flex-shrink: 0;
}
.fp-close {
  align-self: flex-start;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  margin: 0 8px 8px;
}
.fp-close:active { color: var(--text); }

.fp-art-wrap {
  width: min(240px, 55vw);
  height: min(240px, 55vw);
  margin: 0 auto 28px;
  flex-shrink: 0;
}
.fp-art {
  width: 100%; height: 100%;
  background: var(--surface2);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  overflow: hidden;
  position: relative;
}
.fp-art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 20px; display: none; }
.fp-art img.loaded { display: block; }
.fp-art img.loaded ~ .art-fb { display: none; }
.fp-meta {
  width: 100%;
  padding: 0 32px;
  margin-bottom: 24px;
  flex-shrink: 0;
}
.fp-title {
  font-size: 18px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
}
.fp-folder { font-size: 13px; color: var(--text2); }

.fp-progress {
  width: 100%;
  padding: 0 32px;
  margin-bottom: 28px;
  flex-shrink: 0;
}
.fp-prog-bar {
  width: 100%; height: 4px;
  background: var(--border);
  border-radius: 2px;
  cursor: pointer;
  margin-bottom: 8px;
  position: relative;
}
.fp-prog-fill {
  height: 100%;
  background: var(--text);
  border-radius: 2px;
  width: 0%;
  transition: width .1s linear, background .8s ease;
}
.fp-times {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text2);
}

.fp-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  width: 100%;
  padding: 0 24px;
  flex-shrink: 0;
  margin-bottom: 16px;
}
.fp-btn {
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  border-radius: 50%;
  transition: opacity .12s;
}
.fp-btn:active { opacity: .6; }
.fp-btn.secondary {
  color: var(--text2);
  width: 44px; height: 44px;
}
.fp-btn.secondary.active { color: var(--text); }
/* 플레이 버튼: 원 제거, 삼각형만. 색은 나머지 버튼보다 진하게 */
.fp-btn.play {
  width: 64px; height: 64px;
  background: none;
  color: var(--text);
  transition: opacity .12s;
}
.fp-btn.play:active { opacity: .6; }

/* Hide full player on desktop (controls in mini player bar) */
@media (min-width: 768px) {
  .full-player { display: none; }
  .mini-player { cursor: default; }
}

/* ── EMPTY ── */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  gap: 12px;
}
.empty-icon { font-size: 40px; }

/* ── MINI PROGRESS STRIP ── */
.mp-strip {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--border);
  pointer-events: none;
}
.mp-strip-fill {
  height: 100%;
  background: var(--text3);
  width: 0%;
  transition: width .1s linear;
}

/* ── SAFE AREA (notch) ── */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .mini-player { padding-bottom: calc(8px + env(safe-area-inset-bottom)); height: calc(var(--mini-h) + env(safe-area-inset-bottom)); }
  .full-player { padding-bottom: env(safe-area-inset-bottom); }
}
</style>
</head>
<body>

<!-- Drawer Overlay -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- Playlist Drawer -->
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <span>PLAYLIST</span>
    <button class="btn-close-drawer" id="btnCloseDrawer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="folder-list" id="folderList"></div>
</aside>

<!-- App Wrapper -->
<div class="app-wrap">

  <!-- Header -->
  <header>
    <button class="btn-icon btn-playlist" id="btnPlaylist" aria-label="플레이리스트">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="logo">Feelgram <em>Music</em></div>
    <button class="btn-icon" id="btnSearch" aria-label="검색">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </header>

  <!-- Search Bar -->
  <div class="search-bar" id="searchBar">
    <input type="search" id="searchInput" placeholder="곡 검색...">
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- Body -->
  <div class="body-wrap">
    <main id="mainContent">
      <div class="empty"><div class="empty-icon">♪</div><p>폴더를 선택하세요</p></div>
    </main>
  </div>

  <!-- Mini Player -->
  <div class="mini-player" id="miniPlayer">
    <div class="mp-art" id="mpArt">
      <img id="mpArtImg" alt="">
      <span class="art-fb">♫</span>
    </div>
    <div class="mp-info">
      <div class="mp-title" id="mpTitle">재생 중인 곡 없음</div>
      <div class="mp-sub" id="mpSub">Feelgram Music</div>
    </div>
    <!-- Progress strip at bottom -->
    <div class="mp-strip"><div class="mp-strip-fill" id="mpStripFill"></div></div>
    <!-- Mobile: single play/pause -->
    <button class="mp-play-btn" id="mpPlayBtn" aria-label="재생/정지">
      <svg id="mpPlayIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </button>
    <!-- Desktop: full controls -->
    <div class="mp-desktop-controls">
      <div class="mp-ctrl-row">
        <button class="mp-ctrl-btn" id="dShuffle" title="셔플">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </button>
        <button class="mp-ctrl-btn" id="dPrev" title="이전">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="19,5 9,12 19,19"/><rect x="5" y="5" width="3" height="14" rx="1"/>
          </svg>
        </button>
        <button class="mp-ctrl-btn big" id="dPlay" title="재생/정지">
          <svg id="dPlayIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
        <button class="mp-ctrl-btn" id="dNext" title="다음">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,5 15,12 5,19"/><rect x="16" y="5" width="3" height="14" rx="1"/>
          </svg>
        </button>
        <button class="mp-ctrl-btn" id="dRepeat" title="반복">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
      </div>
      <div class="mp-progress-row">
        <span id="dTimeCur">0:00</span>
        <div class="mp-prog-bar" id="dProgBar"><div class="mp-prog-fill" id="dProgFill"></div></div>
        <span id="dTimeTot">0:00</span>
      </div>
    </div>
  </div>

</div><!-- .app-wrap -->

<!-- Full Player (mobile, slides up) -->
<div class="full-player" id="fullPlayer">
  <div class="fp-bg">
    <img class="fp-bg-art" id="fpBgArt" alt="">
    <div class="fp-bg-overlay"></div>

  </button>
  <div class="fp-art-wrap">

    </div>
  </div>
  <div class="fp-meta">

  </div>
  <div class="fp-progress">

    </div>
    <div class="fp-times">
      <span id="fpTimeCur">0:00</span>
      <span id="fpTimeTot">0:00</span>
    </div>
  </div>
  <div class="fp-controls">
    <button class="fp-btn secondary" id="fpShuffle" title="셔플">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
    </button>
    <button class="fp-btn" id="fpPrev">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="19,5 9,12 19,19"/><rect x="5" y="5" width="3" height="14" rx="1"/>
      </svg>
    </button>
    <button class="fp-btn play" id="fpPlay">
      <svg id="fpPlayIcon" width="42" height="42" viewBox="0 0 24 24" fill="currentColor">

      </svg>
    </button>

      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,5 15,12 5,19"/><rect x="16" y="5" width="3" height="14" rx="1"/>
      </svg>
    </button>
    <button class="fp-btn secondary" id="fpRepeat" title="반복">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </button>
  </div>
</div>

<audio id="audioEl"></audio>
<script>
// ── STATE ──
const audio = document.getElementById('audioEl');
let playlist = [], currentFolder = null, currentQueue = [], originalQueue = [], currentIdx = -1;
let shuffle = false, repeat = 'none';

const PAUSE_SVG = `<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>`;
const PLAY_SVG  = `<polygon points="5,3 19,12 5,21"/>`;

// ── LOAD ──
fetch('playlist.json')
  .then(r => r.json())
  .then(data => {
    playlist = data;
    renderFolders();
    if (playlist.length > 0) selectFolder(0);
  })
  .catch(() => {
    document.getElementById('folderList').innerHTML =
      '<div style="padding:16px;color:#888;font-size:13px">playlist.json을 찾을 수 없습니다.</div>';
  });

// ── RENDER ──
function renderFolders() {
  document.getElementById('folderList').innerHTML = playlist.map((f, i) => `
    <div class="folder-item" data-idx="${i}" onclick="selectFolder(${i})">
      <span class="fi-icon">♪</span>
      <span class="fi-name">${f.folder}</span>
      <span class="fi-count">${f.songs.length}</span>
    </div>`).join('');
}

function selectFolder(idx) {
  currentFolder = idx;
  document.querySelectorAll('.folder-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  renderSongList(playlist[idx]);
  closeDrawer();
}

function renderSongList(folder) {
  document.getElementById('mainContent').innerHTML = `
    <div class="list-header">
      <div class="list-header-row">
        <span class="lh-icon">${folder.icon}</span>
        <span class="lh-name">${folder.folder}</span>
        <span class="lh-count">${folder.songs.length}곡</span>
      </div>
      <button class="btn-play-all" onclick="playAll(${currentFolder})">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        전체 재생
      </button>
    </div>
    <div class="song-list">
      ${folder.songs.map((s, i) => songRowHTML(s, i)).join('')}
    </div>`;
}

function songRowHTML(filename, idx) {
  const title = filename.replace(/\.(mp3|m4a|wav|ogg|flac|wmv)$/i, '');
  const playing = currentQueue[currentIdx] === filename && audio.src;
  return `<div class="song-row${playing ? ' playing' : ''}" data-file="${esc(filename)}" onclick="playFromFolder(${currentFolder},${idx})">
    <span class="song-num">${idx + 1}</span>
    <div class="song-eq">
      <div class="eq-bar" style="height:2px"></div>
      <div class="eq-bar" style="height:8px"></div>
      <div class="eq-bar" style="height:4px"></div>
    </div>
    <span class="song-title">${esc(title)}</span>
  </div>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── PLAYBACK ──
function playFromFolder(folderIdx, songIdx) {
  originalQueue = [...playlist[folderIdx].songs];
  currentQueue = shuffle ? shuffled(originalQueue, songIdx) : [...originalQueue];
  currentIdx = shuffle ? 0 : songIdx;
  playCurrent();
}

function playAll(folderIdx) { playFromFolder(folderIdx, 0); }

function playCurrent() {
  const fn = currentQueue[currentIdx];
  if (!fn) return;
  audio.src = 'music/' + encodeURIComponent(fn);
  audio.load();
  audio.play().catch(() => {});
  updateNowPlaying(fn);
  setPlayIcons(true);
  highlightPlaying(fn);
}

function updateNowPlaying(fn) {
  const title  = fn.replace(/\.(mp3|m4a|wav|ogg|flac|wmv)$/i, '');
  const folder = currentFolder !== null ? playlist[currentFolder].folder : '';
  document.getElementById('mpTitle').textContent  = title;
  document.getElementById('mpSub').textContent    = folder;
  document.getElementById('fpTitle').textContent  = title;
  document.getElementById('fpTitle').title        = title;
  document.getElementById('fpFolder').textContent = folder;
  document.title = title + ' — Feelgram Music';
  loadAlbumArt('music/' + encodeURIComponent(fn));
}

async function loadAlbumArt(url) {
  const mpImg = document.getElementById('mpArtImg');
  const fpImg = document.getElementById('fpArtImg');
  mpImg.classList.remove('loaded');
  fpImg.classList.remove('loaded');
  resetPlayerTheme();

  try {
    const res = await fetch(url, { headers: { Range: 'bytes=0-655359' } });
    if (!res.ok && res.status !== 206) return;
    const buf  = await res.arrayBuffer();
    const data = new Uint8Array(buf);
    const art  = extractID3Cover(data);
    if (!art) return;

    const isPng = art[0] === 0x89;
    const blob  = new Blob([art], { type: isPng ? 'image/png' : 'image/jpeg' });
    const src   = URL.createObjectURL(blob);

    [mpImg, fpImg].forEach(img => {
      if (img._blobUrl) URL.revokeObjectURL(img._blobUrl);
      img._blobUrl = src;
      img.src = src;
      img.onload = () => {
        img.classList.add('loaded');
        if (img === fpImg) {
          const hsl = extractDominantHsl(img);
          applyPlayerTheme(hsl, src); // 블러 배경 + 진행바 색
        }
      };
    });
  } catch (e) { /* 앨범아트 없음 → ♫ 폴백 유지 */ }
}

// ── 색 분석 ──
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), l = (max+min)/2;
  if (max === min) return [0, 0, l];
  const d = max - min;
  const s = l > 0.5 ? d/(2-max-min) : d/(max+min);
  let h;
  if      (max===r) h = (g-b)/d + (g<b ? 6 : 0);
  else if (max===g) h = (b-r)/d + 2;
  else              h = (r-g)/d + 4;
  return [h*60, s, l];
}

function extractDominantHsl(imgEl) {
  try {
    const SIZE = 64;
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = SIZE;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(imgEl, 0, 0, SIZE, SIZE);
    const px = ctx.getImageData(0, 0, SIZE, SIZE).data;

    // 36개 색상 버킷(10° 단위)에 픽셀 누적
    const hSum = new Float64Array(36);
    const sSum = new Float64Array(36);
    const lSum = new Float64Array(36);
    const cnt  = new Int32Array(36);

    for (let i = 0; i < px.length; i += 4) {
      if (px[i+3] < 128) continue;
      const [h, s, l] = rgbToHsl(px[i], px[i+1], px[i+2]);
      // 흰색(L>0.87), 검정(L<0.13), 회색(S<0.18) 제외
      if (l > 0.87 || l < 0.13 || s < 0.18) continue;
      const b = Math.floor(h / 10) % 36;
      hSum[b] += h; sSum[b] += s; lSum[b] += l; cnt[b]++;
    }

    let best = -1, bestN = 0;
    for (let i = 0; i < 36; i++) if (cnt[i] > bestN) { bestN = cnt[i]; best = i; }
    if (best < 0 || bestN < 8) return null; // 색감 없는 이미지

    const n = cnt[best];
    return { h: hSum[best]/n, s: sSum[best]/n * 100, l: lSum[best]/n * 100 };
  } catch(e) { return null; }
}

function applyPlayerTheme(hsl, artSrc) {
  const fpBgArt  = document.getElementById('fpBgArt');
  const bar      = document.getElementById('fpProgFill');
  const fp       = document.getElementById('fullPlayer');

  // ① 앨범아트 블러 배경
  if (artSrc) {
    fpBgArt.classList.remove('show');
    fpBgArt.src = artSrc;
    fpBgArt.onload = () => { fpBgArt.offsetHeight; fpBgArt.classList.add('show'); };
  }

  // ② 진행바 색: 앨범아트 색조 반영
  if (hsl) {
    const { h, s } = hsl;
    const barS = Math.min(s * 0.85, 68);
    bar.style.background = `hsl(${h}, ${barS}%, 35%)`;
  } else {
    bar.style.background = '';
  }
}

function resetPlayerTheme() {
  const fpBgArt = document.getElementById('fpBgArt');
  const bar     = document.getElementById('fpProgFill');
  const fp      = document.getElementById('fullPlayer');
  fpBgArt.classList.remove('show');
  fpBgArt.src = '';
  bar.style.background = '';
}

function extractID3Cover(d) {
  // ID3v2 magic check
  if (d[0] !== 0x49 || d[1] !== 0x44 || d[2] !== 0x33) return null;

  const ver  = d[3]; // 2=v2.2, 3=v2.3, 4=v2.4
  // syncsafe tag size
  const tagEnd = 10 + (((d[6]&0x7f)<<21)|((d[7]&0x7f)<<14)|((d[8]&0x7f)<<7)|(d[9]&0x7f));

  let pos = 10;
  while (pos < tagEnd - 10 && pos < d.length - 10) {
    let id, size, hLen;

    if (ver >= 3) {
      id   = String.fromCharCode(d[pos],d[pos+1],d[pos+2],d[pos+3]);
      // v2.4 uses syncsafe frame size; v2.3 uses plain uint32
      size = ver === 4
        ? (((d[pos+4]&0x7f)<<21)|((d[pos+5]&0x7f)<<14)|((d[pos+6]&0x7f)<<7)|(d[pos+7]&0x7f))
        : ((d[pos+4]<<24)|(d[pos+5]<<16)|(d[pos+6]<<8)|d[pos+7]);
      hLen = 10;
    } else {
      // ID3v2.2: 3-byte ID, 3-byte size
      id   = String.fromCharCode(d[pos],d[pos+1],d[pos+2]);
      size = (d[pos+3]<<16)|(d[pos+4]<<8)|d[pos+5];
      hLen = 6;
    }

    if (size <= 0 || pos + hLen + size > d.length) break;

    if (id === 'APIC' || id === 'PIC') {
      const frame = d.subarray(pos + hLen, pos + hLen + size);
      // JPEG magic: FF D8 FF  |  PNG magic: 89 50 4E 47
      for (let i = 1; i < frame.length - 4; i++) {
        if ((frame[i] === 0xFF && frame[i+1] === 0xD8 && frame[i+2] === 0xFF) ||
            (frame[i] === 0x89 && frame[i+1] === 0x50 && frame[i+2] === 0x4E && frame[i+3] === 0x47)) {
          return frame.subarray(i);
        }
      }
    }

    pos += hLen + size;
  }
  return null;
}

function highlightPlaying(fn) {
  document.querySelectorAll('.song-row').forEach(r => r.classList.toggle('playing', r.dataset.file === fn));
}

function setPlayIcons(playing) {
  const svg = playing ? PAUSE_SVG : PLAY_SVG;
  document.getElementById('mpPlayIcon').innerHTML = svg;
  document.getElementById('fpPlayIcon').innerHTML = svg;
  document.getElementById('dPlayIcon').innerHTML  = svg;
}

function togglePlay() {
  if (!audio.src) { if (currentFolder !== null) playAll(currentFolder); return; }
  if (audio.paused) { audio.play(); setPlayIcons(true); }
  else              { audio.pause(); setPlayIcons(false); }
}

function nextTrack() {
  currentIdx = (currentIdx + 1) % currentQueue.length;
  playCurrent();
}
function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  currentIdx = (currentIdx - 1 + currentQueue.length) % currentQueue.length;
  playCurrent();
}

function shuffled(arr, keepIdx) {
  const a = [...arr], first = a.splice(keepIdx, 1)[0];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return [first, ...a];
}

function toggleShuffle() {
  shuffle = !shuffle;
  [document.getElementById('fpShuffle'), document.getElementById('dShuffle')]
    .forEach(b => b.classList.toggle('active', shuffle));
  if (shuffle && currentQueue.length) {
    const cur = currentQueue[currentIdx];
    currentQueue = shuffled(originalQueue, originalQueue.indexOf(cur));
    currentIdx = 0;
  } else if (currentQueue.length) {
    const cur = currentQueue[currentIdx];
    currentQueue = [...originalQueue];
    currentIdx = originalQueue.indexOf(cur);
  }
}

function toggleRepeat() {
  const modes = ['none','all','one'];
  repeat = modes[(modes.indexOf(repeat) + 1) % modes.length];
  [document.getElementById('fpRepeat'), document.getElementById('dRepeat')]
    .forEach(b => b.classList.toggle('active', repeat !== 'none'));
}

audio.onended = () => {
  if (repeat === 'one') { audio.play(); return; }
  if (repeat === 'all' || currentIdx < currentQueue.length - 1) { nextTrack(); }
  else setPlayIcons(false);
};

// ── PROGRESS ──
function fmtTime(s) {
  s = Math.floor(s || 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

audio.ontimeupdate = () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100 + '%';
  document.getElementById('fpProgFill').style.width  = pct;
  document.getElementById('dProgFill').style.width   = pct;
  document.getElementById('mpStripFill').style.width = pct;
  const cur = fmtTime(audio.currentTime), tot = fmtTime(audio.duration);
  document.getElementById('fpTimeCur').textContent = cur;
  document.getElementById('fpTimeTot').textContent = tot;
  document.getElementById('dTimeCur').textContent  = cur;
  document.getElementById('dTimeTot').textContent  = tot;
};

function seekBar(bar, e) {
  const rect = bar.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  audio.currentTime = Math.max(0, Math.min(1, x / rect.width)) * audio.duration;
}

document.getElementById('fpProgBar').addEventListener('click', e => seekBar(e.currentTarget, e));
document.getElementById('dProgBar').addEventListener('click',  e => seekBar(e.currentTarget, e));

// ── CONTROLS WIRING ──
document.getElementById('mpPlayBtn').onclick = e => { e.stopPropagation(); togglePlay(); };
document.getElementById('fpPlay').onclick    = togglePlay;
document.getElementById('dPlay').onclick     = togglePlay;
document.getElementById('fpPrev').onclick    = prevTrack;
document.getElementById('dPrev').onclick     = prevTrack;
document.getElementById('fpNext').onclick    = nextTrack;
document.getElementById('dNext').onclick     = nextTrack;
document.getElementById('fpShuffle').onclick = toggleShuffle;
document.getElementById('dShuffle').onclick  = toggleShuffle;
document.getElementById('fpRepeat').onclick  = toggleRepeat;
document.getElementById('dRepeat').onclick   = toggleRepeat;

// ── FULL PLAYER (slide up) ──
const fullPlayer = document.getElementById('fullPlayer');

function openFullPlayer() {
  if (window.innerWidth >= 768) return;
  fullPlayer.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFullPlayer() {
  fullPlayer.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('miniPlayer').onclick = openFullPlayer;
document.getElementById('fpClose').onclick     = closeFullPlayer;

// swipe down to close full player
let touchStartY = 0;
fullPlayer.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
fullPlayer.addEventListener('touchend',   e => {
  if (e.changedTouches[0].clientY - touchStartY > 80) closeFullPlayer();
}, { passive: true });

// ── DRAWER ──
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}
document.getElementById('btnPlaylist').onclick     = openDrawer;
document.getElementById('btnCloseDrawer').onclick  = closeDrawer;
document.getElementById('drawerOverlay').onclick   = closeDrawer;

// ── SEARCH ──
const searchBar     = document.getElementById('searchBar');
const searchInput   = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
let searchOpen = false;

document.getElementById('btnSearch').onclick = () => {
  searchOpen = !searchOpen;
  searchBar.classList.toggle('open', searchOpen);
  if (searchOpen) searchInput.focus();
  else { searchInput.value = ''; searchResults.classList.remove('visible'); }
};

searchInput.oninput = function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('visible'); return; }
  const hits = [];
  for (const folder of playlist) {
    for (const song of folder.songs) {
      if (song.toLowerCase().includes(q)) hits.push({ song, folder });
      if (hits.length >= 40) break;
    }
    if (hits.length >= 40) break;
  }
  if (!hits.length) {
    searchResults.innerHTML = '<div style="padding:14px;color:#888;font-size:13px;text-align:center">검색 결과 없음</div>';
  } else {
    searchResults.innerHTML = hits.map(h => {
      const title = h.song.replace(/\.(mp3|m4a|wav|ogg|flac|wmv)$/i, '');
      const fi = playlist.indexOf(h.folder), si = h.folder.songs.indexOf(h.song);
      return `<div class="sr-item" onclick="playFromSearch(${fi},${si})">
        <span>${h.folder.icon}</span>
        <span class="sr-title">${esc(title)}</span>
        <span class="sr-folder">${esc(h.folder.folder)}</span>
      </div>`;
    }).join('');
  }
  searchResults.classList.add('visible');
};

function playFromSearch(fi, si) {
  selectFolder(fi);
  playFromFolder(fi, si);
  searchInput.value = '';
  searchResults.classList.remove('visible');
  searchBar.classList.remove('open');
  searchOpen = false;
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.target === searchInput) return;
  if (e.code === 'Space')       { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight')  audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 5);
  if (e.code === 'ArrowLeft')   audio.currentTime = Math.max(0, audio.currentTime - 5);
});
</script>
