<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feelgram Music</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --accent-glow: rgba(124,106,247,0.25);
    --text: #e8e8f0;
    --text2: #8888aa;
    --text3: #5555777;
    --player-h: 90px;
    --sidebar-w: 260px;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  header {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 12px var(--accent-glow);
    flex-shrink: 0;
  }
  .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-text span { color: var(--accent2); }
  header .search-wrap {
    margin-left: auto;
    position: relative;
  }
  header input[type=search] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    padding: 6px 14px 6px 34px;
    font-size: 13px;
    width: 220px;
    outline: none;
    transition: border-color .2s;
  }
  header input[type=search]:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text2); font-size: 14px; pointer-events: none;
  }

  /* ── MAIN LAYOUT ── */
  .app-body {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px 16px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text2);
    text-transform: uppercase;
  }
  .folder-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
  }
  .folder-list::-webkit-scrollbar { width: 4px; }
  .folder-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .folder-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    user-select: none;
  }
  .folder-item:hover { background: var(--surface2); }
  .folder-item.active {
    background: var(--accent-glow);
    color: var(--accent2);
  }
  .folder-item .fi-icon { font-size: 16px; width: 20px; text-align: center; }
  .folder-item .fi-name { flex: 1; font-size: 13.5px; font-weight: 500; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .folder-item .fi-count {
    font-size: 11px;
    color: var(--text2);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 10px;
    min-width: 28px;
    text-align: center;
  }
  .folder-item.active .fi-count { background: rgba(124,106,247,.3); color: var(--accent2); }

  /* ── SONG LIST ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  .list-header {
    padding: 18px 24px 14px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .list-header h2 {
    font-size: 22px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .list-header .lh-icon { font-size: 24px; }
  .list-header .lh-count { font-size: 13px; font-weight: 400; color: var(--text2); margin-top: 2px; }
  .btn-play-all {
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, box-shadow .15s;
  }
  .btn-play-all:hover { opacity: .88; box-shadow: 0 4px 14px var(--accent-glow); }

  .song-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px 16px;
  }
  .song-list::-webkit-scrollbar { width: 4px; }
  .song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .song-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .12s;
  }
  .song-row:hover { background: var(--surface2); }
  .song-row.playing {
    background: var(--accent-glow);
  }
  .song-num {
    width: 24px;
    text-align: right;
    font-size: 12px;
    color: var(--text2);
    flex-shrink: 0;
  }
  .song-row.playing .song-num { display: none; }
  .song-row.playing .song-eq { display: flex; }
  .song-eq {
    display: none;
    width: 24px;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
    height: 16px;
    flex-shrink: 0;
  }
  .eq-bar {
    width: 3px;
    background: var(--accent2);
    border-radius: 2px;
    animation: eqAnim 0.8s ease-in-out infinite alternate;
  }
  .eq-bar:nth-child(2) { animation-delay: .15s; }
  .eq-bar:nth-child(3) { animation-delay: .3s; }
  @keyframes eqAnim {
    from { height: 3px; }
    to { height: 14px; }
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title {
    font-size: 13.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-row.playing .song-title { color: var(--accent2); }
  .song-add {
    opacity: 0;
    font-size: 18px;
    color: var(--text2);
    cursor: pointer;
    transition: opacity .15s, color .15s;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .song-row:hover .song-add { opacity: 1; }
  .song-add:hover { color: var(--accent2); }

  /* ── PLAYER BAR ── */
  .player-bar {
    height: var(--player-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    flex-shrink: 0;
    backdrop-filter: blur(12px);
  }
  .now-playing {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
    flex: 1;
  }
  .np-art {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), #5b4cdb);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(0,0,0,.4);
  }
  .np-info { min-width: 0; }
  .np-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 2;
  }
  .ctrl-btns {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
    transition: color .15s, transform .1s;
    padding: 4px;
    display: flex;
    align-items: center;
  }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn.active { color: var(--accent2); }
  .ctrl-btn.play-pause {
    width: 40px; height: 40px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    font-size: 16px;
    justify-content: center;
    box-shadow: 0 2px 10px var(--accent-glow);
  }
  .ctrl-btn.play-pause:hover { opacity: .9; transform: scale(1.06); }

  .progress-wrap {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text2);
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width .1s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px; top: -4px;
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    transition: opacity .15s;
  }
  .progress-bar:hover .progress-fill::after { opacity: 1; }

  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    justify-content: flex-end;
  }
  .vol-icon { font-size: 16px; color: var(--text2); cursor: pointer; }
  input[type=range].vol-slider {
    -webkit-appearance: none;
    width: 90px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    outline: none;
  }
  input[type=range].vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--accent2);
    border-radius: 50%;
  }

  /* ── EMPTY STATE ── */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    gap: 12px;
  }
  .empty .em-icon { font-size: 48px; }
  .empty p { font-size: 14px; }

  /* ── SEARCH RESULTS ── */
  .search-overlay {
    display: none;
    position: fixed;
    top: 56px; right: 20px;
    width: 340px;
    max-height: 400px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    padding: 8px 0;
  }
  .search-overlay.visible { display: block; }
  .sr-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    transition: background .12s;
    font-size: 13px;
  }
  .sr-item:hover { background: var(--border); }
  .sr-folder { font-size: 11px; color: var(--text2); margin-left: auto; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">♫</div>
  <div class="logo-text">Feel<span>gram</span> Music</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="곡 검색...">
  </div>
</header>

<div class="app-body">
  <aside>
    <div class="sidebar-header">플레이리스트</div>
    <div class="folder-list" id="folderList"></div>
  </aside>

  <main>
    <div id="mainContent">
      <div class="empty">
        <div class="em-icon">🎵</div>
        <p>폴더를 선택하세요</p>
      </div>
    </div>
  </main>
</div>

<div class="player-bar">
  <div class="now-playing">
    <div class="np-art" id="npArt">♫</div>
    <div class="np-info">
      <div class="np-title" id="npTitle">재생 중인 곡 없음</div>
      <div class="np-sub" id="npSub">Feelgram Music</div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-btns">
      <button class="ctrl-btn" id="btnShuffle" title="셔플">⇌</button>
      <button class="ctrl-btn" id="btnPrev" title="이전">⏮</button>
      <button class="ctrl-btn play-pause" id="btnPlay" title="재생/일시정지">▶</button>
      <button class="ctrl-btn" id="btnNext" title="다음">⏭</button>
      <button class="ctrl-btn" id="btnRepeat" title="반복">↺</button>
    </div>
    <div class="progress-wrap">
      <span id="timeCur">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span id="timeTot">0:00</span>
    </div>
  </div>

  <div class="volume-wrap">
    <span class="vol-icon" id="volIcon">🔊</span>
    <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="0.8">
  </div>
</div>

<div class="search-overlay" id="searchOverlay"></div>

<audio id="audioEl"></audio>

<script>
const audio = document.getElementById('audioEl');
let playlist = [];       // all folders
let currentFolder = null;
let currentQueue = [];   // songs in current view/shuffle
let currentIdx = -1;
let shuffle = false;
let repeat = 'none'; // 'none' | 'one' | 'all'
let originalQueue = [];

// ── LOAD PLAYLIST ──
fetch('playlist.json')
  .then(r => r.json())
  .then(data => {
    playlist = data;
    renderFolders();
    // auto-open first folder
    if (playlist.length > 0) selectFolder(0);
  })
  .catch(() => {
    document.getElementById('folderList').innerHTML =
      '<div style="padding:16px;color:#888;font-size:13px;">playlist.json을 찾을 수 없습니다.</div>';
  });

function renderFolders() {
  const el = document.getElementById('folderList');
  el.innerHTML = playlist.map((f, i) => `
    <div class="folder-item" data-idx="${i}" onclick="selectFolder(${i})">
      <span class="fi-icon">${f.icon}</span>
      <span class="fi-name">${f.folder}</span>
      <span class="fi-count">${f.songs.length}</span>
    </div>
  `).join('');
}

function selectFolder(idx) {
  currentFolder = idx;
  document.querySelectorAll('.folder-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  const folder = playlist[idx];
  renderSongList(folder);
}

function renderSongList(folder) {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="list-header">
      <h2><span class="lh-icon">${folder.icon}</span>${folder.folder}</h2>
      <div class="lh-count">${folder.songs.length}곡</div>
      <button class="btn-play-all" onclick="playAll(${currentFolder})">▶ 전체 재생</button>
    </div>
    <div class="song-list" id="songListEl">
      ${folder.songs.map((s, i) => songRowHTML(s, i, folder)).join('')}
    </div>
  `;
}

function songRowHTML(filename, idx, folder) {
  const title = filename.replace(/\.(mp3|m4a|wav|ogg|flac|wmv)$/i, '');
  const isPlaying = currentQueue[currentIdx] === filename && audio.src;
  return `
    <div class="song-row ${isPlaying ? 'playing' : ''}" data-file="${esc(filename)}" onclick="playFromFolder(${currentFolder}, ${idx})">
      <span class="song-num">${idx + 1}</span>
      <div class="song-eq"><div class="eq-bar" style="height:4px"></div><div class="eq-bar" style="height:9px"></div><div class="eq-bar" style="height:6px"></div></div>
      <div class="song-info">
        <div class="song-title">${esc(title)}</div>
      </div>
    </div>
  `;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function playFromFolder(folderIdx, songIdx) {
  const folder = playlist[folderIdx];
  originalQueue = [...folder.songs];
  currentQueue = shuffle ? shuffled(originalQueue, songIdx) : [...originalQueue];
  currentIdx = shuffle ? 0 : songIdx;
  playCurrent();
}

function playAll(folderIdx) {
  playFromFolder(folderIdx, 0);
}

function playCurrent() {
  const filename = currentQueue[currentIdx];
  if (!filename) return;
  audio.src = 'music/' + encodeURIComponent(filename);
  audio.load();
  audio.play().catch(() => {});
  updateNowPlaying(filename);
  document.getElementById('btnPlay').textContent = '⏸';
  highlightPlaying(filename);
}

function updateNowPlaying(filename) {
  const title = filename.replace(/\.(mp3|m4a|wav|ogg|flac|wmv)$/i, '');
  document.getElementById('npTitle').textContent = title;
  document.getElementById('npTitle').title = title;
  // pick icon from current folder
  const folderIcon = currentFolder !== null ? playlist[currentFolder].icon : '♫';
  document.getElementById('npArt').textContent = folderIcon;
  document.title = title + ' — Feelgram Music';
}

function highlightPlaying(filename) {
  document.querySelectorAll('.song-row').forEach(row => {
    row.classList.toggle('playing', row.dataset.file === filename);
  });
}

function shuffled(arr, keepFirstIdx) {
  const result = [...arr];
  const first = result.splice(keepFirstIdx, 1)[0];
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return [first, ...result];
}

// ── CONTROLS ──
document.getElementById('btnPlay').onclick = () => {
  if (!audio.src) { if (currentFolder !== null) playAll(currentFolder); return; }
  if (audio.paused) { audio.play(); document.getElementById('btnPlay').textContent = '⏸'; }
  else { audio.pause(); document.getElementById('btnPlay').textContent = '▶'; }
};

document.getElementById('btnNext').onclick = () => {
  currentIdx = (currentIdx + 1) % currentQueue.length;
  playCurrent();
};

document.getElementById('btnPrev').onclick = () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  currentIdx = (currentIdx - 1 + currentQueue.length) % currentQueue.length;
  playCurrent();
};

document.getElementById('btnShuffle').onclick = function() {
  shuffle = !shuffle;
  this.classList.toggle('active', shuffle);
  if (shuffle && currentQueue.length > 0) {
    const cur = currentQueue[currentIdx];
    currentQueue = shuffled(originalQueue, originalQueue.indexOf(cur));
    currentIdx = 0;
  } else if (currentQueue.length > 0) {
    const cur = currentQueue[currentIdx];
    currentQueue = [...originalQueue];
    currentIdx = originalQueue.indexOf(cur);
  }
};

document.getElementById('btnRepeat').onclick = function() {
  const modes = ['none', 'all', 'one'];
  repeat = modes[(modes.indexOf(repeat) + 1) % modes.length];
  this.classList.toggle('active', repeat !== 'none');
  this.textContent = repeat === 'one' ? '↺¹' : '↺';
  this.title = { none: '반복 없음', all: '전체 반복', one: '한 곡 반복' }[repeat];
};

audio.onended = () => {
  if (repeat === 'one') { audio.play(); return; }
  if (repeat === 'all' || currentIdx < currentQueue.length - 1) {
    currentIdx = (currentIdx + 1) % currentQueue.length;
    playCurrent();
  } else {
    document.getElementById('btnPlay').textContent = '▶';
  }
};

// ── PROGRESS ──
audio.ontimeupdate = () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeCur').textContent = fmtTime(audio.currentTime);
  document.getElementById('timeTot').textContent = fmtTime(audio.duration);
};

document.getElementById('progressBar').onclick = function(e) {
  const rect = this.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
};

function fmtTime(s) {
  s = Math.floor(s || 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

// ── VOLUME ──
const volSlider = document.getElementById('volSlider');
audio.volume = parseFloat(volSlider.value);
volSlider.oninput = () => {
  audio.volume = parseFloat(volSlider.value);
  document.getElementById('volIcon').textContent = audio.volume < 0.01 ? '🔇' : audio.volume < 0.5 ? '🔉' : '🔊';
};
document.getElementById('volIcon').onclick = () => {
  audio.muted = !audio.muted;
  document.getElementById('volIcon').textContent = audio.muted ? '🔇' : '🔊';
};

// ── SEARCH ──
const searchInput = document.getElementById('searchInput');
const searchOverlay = document.getElementById('searchOverlay');

searchInput.oninput = function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { searchOverlay.classList.remove('visible'); return; }
  const results = [];
  for (const folder of playlist) {
    for (const song of folder.songs) {
      if (song.toLowerCase().includes(q)) {
        results.push({ song, folder });
      }
    }
  }
  if (!results.length) {
    searchOverlay.innerHTML = '<div style="padding:14px;color:#888;font-size:13px;text-align:center">검색 결과 없음</div>';
  } else {
    searchOverlay.innerHTML = results.slice(0, 40).map(r => {
      const title = r.song.replace(/\.(mp3|m4a|wav|ogg|flac|wmv)$/i, '');
      const folderIdx = playlist.indexOf(r.folder);
      const songIdx = r.folder.songs.indexOf(r.song);
      return `<div class="sr-item" onclick="playFromSearch(${folderIdx},${songIdx})">
        <span>${r.folder.icon}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(title)}</span>
        <span class="sr-folder">${esc(r.folder.folder)}</span>
      </div>`;
    }).join('');
  }
  searchOverlay.classList.add('visible');
};

function playFromSearch(folderIdx, songIdx) {
  selectFolder(folderIdx);
  playFromFolder(folderIdx, songIdx);
  searchInput.value = '';
  searchOverlay.classList.remove('visible');
}

document.addEventListener('click', e => {
  if (!searchOverlay.contains(e.target) && e.target !== searchInput) {
    searchOverlay.classList.remove('visible');
  }
});

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.target === searchInput) return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('btnPlay').click(); }
  if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
  if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 5);
  if (e.code === 'ArrowUp') { volSlider.value = Math.min(1, +volSlider.value + 0.05); volSlider.oninput(); }
  if (e.code === 'ArrowDown') { volSlider.value = Math.max(0, +volSlider.value - 0.05); volSlider.oninput(); }
});
</script>
</body>
</html>
